name: Deploy Homepage to GitHub Pages

on:
  push:
    branches:
      - main

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install admin dependencies
        run: |
          cd admin
          npm install

      - name: Build admin app
        run: |
          cd admin
          VITE_BASE=/ijenbromotrip/admin/ npm run build

      - name: Prepare static website files
        run: |
          rm -rf site
          mkdir -p site/admin
          cp index.html trip.html destination.html styles.css script.js homepage-data.js trip-detail.js destination-detail.js site/
          cp -r admin/dist/* site/admin/
          echo "" > site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
